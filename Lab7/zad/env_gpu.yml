name: rag_gpu
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pytorch=2.3.1
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1    # dopasuj do sterownika NVIDIA
  - pip:
      - transformers==4.43.3
      - accelerate==0.33.0
      - safetensors
      - sentencepiece
      - tokenizers>=0.19.0
      - faiss-cpu
      - pymupdf
      - sentence_transformers
      - iprogress
      - ipywidgets
      - numpy
      - scipy
      - tqdm
      - huggingface-hub
      - hf_xet